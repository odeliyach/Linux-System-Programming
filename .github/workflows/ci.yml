name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format clang-tidy

    - name: Check code formatting
      run: |
        find src include tests benchmarks -name '*.c' -o -name '*.h' | \
        xargs clang-format --dry-run --Werror

    - name: Run clang-tidy
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ..
        cd ..
        find src -name '*.c' | xargs clang-tidy -p build

  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-20.04]
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential
        if [ "${{ matrix.compiler }}" == "clang" ]; then
          sudo apt-get install -y clang
        fi

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        if [ "${{ matrix.compiler }}" == "clang" ]; then
          export CC=clang
          export CXX=clang++
        fi
        cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DBUILD_TESTS=ON \
              -DBUILD_BENCHMARKS=ON \
              ..

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run Tests
      run: cd build && ctest --output-on-failure --verbose

    - name: Run Benchmarks
      if: matrix.build_type == 'Release'
      run: cd build && ./benchmarks/queue_benchmark

  sanitizers:
    name: Sanitizer Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        sanitizer: [address, undefined, thread]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential clang

    - name: Configure with Sanitizers
      run: |
        mkdir -p build
        cd build
        export CC=clang
        cmake -DCMAKE_BUILD_TYPE=Debug \
              -DENABLE_SANITIZERS=ON \
              -DCMAKE_C_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
              -DBUILD_TESTS=ON \
              ..

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run Tests with Sanitizers
      run: cd build && ctest --output-on-failure

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t linux-sys-prog:latest .

    - name: Test Docker image
      run: |
        docker run --rm linux-sys-prog:latest /usr/local/bin/myshell --version || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential gcovr lcov

    - name: Configure with Coverage
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Debug \
              -DENABLE_COVERAGE=ON \
              -DBUILD_TESTS=ON \
              ..

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run Tests
      run: cd build && ctest --output-on-failure

    - name: Generate Coverage Report
      run: |
        cd build
        gcovr -r .. --html --html-details -o coverage.html
        gcovr -r .. --xml -o coverage.xml

    - name: Upload Coverage Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: build/coverage.*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Release Artifacts
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --parallel $(nproc)
        cpack -G TGZ

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
