# Docker Compose configuration for development and testing
version: '3.8'

services:
  # Development environment
  dev:
    build:
      context: .
      target: builder
    volumes:
      - .:/build
      - build-cache:/build/build
    working_dir: /build
    command: /bin/bash
    stdin_open: true
    tty: true

  # Production runtime
  prod:
    build:
      context: .
      target: runtime
    stdin_open: true
    tty: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE  # Required for debugging

volumes:
  build-cache:
